research_description: Research on Thin-Film Transistors (TFTs) focusing on novel semiconductor
  materials (oxide, organic, perovskite, 2D materials), flexible and stretchable electronics,
  device physics, stability improvement, and applications in active matrix displays,
  large-area X-ray sensors, neuromorphic computing, and bio-integrated electronics.
keywords:
- Thin-Film Transistor
- Oxide semiconductor
- IGZO
- Organic field-effect transistor
- Perovskite transistor
- Flexible electronics
- Stretchable electronics
- Solution-processed TFT
- Device stability
- Active matrix display
- X-ray detector
- Neuromorphic computing
- 2D materials
