{% extends "base.html" %}
{% block title %}设置 — ScholarPulse{% endblock %}

{% block content %}
<h1 class="text-xl font-bold text-gray-800 mb-6">⚙️ 设置</h1>

{% if saved %}
<div class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg mb-6 text-sm">
    ✅ 设置已保存
</div>
{% endif %}

<form method="post" action="/settings" class="space-y-8">
    <!-- 研究方向 -->
    <section class="bg-white rounded-lg shadow-sm border border-gray-100 p-6">
        <h2 class="text-lg font-semibold text-gray-800 mb-4">🎯 研究方向</h2>
        <textarea name="research_description" rows="5"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
            placeholder="描述你的研究方向...">{{ config.research_description }}</textarea>
    </section>

    <!-- 关键词 -->
    <section class="bg-white rounded-lg shadow-sm border border-gray-100 p-6">
        <h2 class="text-lg font-semibold text-gray-800 mb-4">🔑 搜索关键词</h2>
        <p class="text-xs text-gray-500 mb-2">每行一个关键词</p>
        <textarea name="keywords" rows="10"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm font-mono focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
            >{{ config.keywords | join('\n') }}</textarea>
    </section>

    <!-- 数据源 -->
    <section class="bg-white rounded-lg shadow-sm border border-gray-100 p-6">
        <h2 class="text-lg font-semibold text-gray-800 mb-4">📡 数据源</h2>
        <div class="space-y-4">
            <label class="flex items-center gap-3">
                <input type="checkbox" name="ss_enabled" value="true"
                    {{ 'checked' if config.sources.get('semantic_scholar') and config.sources['semantic_scholar'].enabled }}
                    class="rounded text-indigo-600">
                <span class="text-sm font-medium">Semantic Scholar</span>
                <span class="text-xs text-gray-400">免费 API，100 次/5 分钟</span>
            </label>

            <div>
                <label class="flex items-center gap-3">
                    <input type="checkbox" name="arxiv_enabled" value="true"
                        {{ 'checked' if config.sources.get('arxiv') and config.sources['arxiv'].enabled }}
                        class="rounded text-indigo-600">
                    <span class="text-sm font-medium">arXiv</span>
                    <span class="text-xs text-gray-400">预印本</span>
                </label>
                <div class="ml-7 mt-2">
                    <p class="text-xs text-gray-500 mb-1">arXiv 分类（每行一个）：</p>
                    <textarea name="arxiv_categories" rows="5"
                        class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm font-mono focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                        >{% if config.sources.get('arxiv') %}{{ config.sources['arxiv'].categories | join('\n') }}{% endif %}</textarea>
                </div>
            </div>
        </div>
    </section>

    <!-- LLM 配置 -->
    <section class="bg-white rounded-lg shadow-sm border border-gray-100 p-6">
        <h2 class="text-lg font-semibold text-gray-800 mb-4">🤖 LLM 配置</h2>
        <p class="text-xs text-gray-500 mb-4">API Key 通过 .env 文件配置（DASHSCOPE_API_KEY）</p>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">API Base URL</label>
                <input type="text" name="llm_base_url" value="{{ config.llm.base_url }}"
                    class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">模型名称</label>
                <input type="text" name="llm_model" value="{{ config.llm.model }}"
                    class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">最大并发数</label>
                <input type="number" name="llm_max_concurrent" value="{{ config.llm.max_concurrent }}" min="1" max="20"
                    class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
            </div>
        </div>
    </section>

    <!-- 调度 -->
    <section class="bg-white rounded-lg shadow-sm border border-gray-100 p-6">
        <h2 class="text-lg font-semibold text-gray-800 mb-4">⏰ 定时调度</h2>
        <div class="space-y-4">
            <label class="flex items-center gap-3">
                <input type="checkbox" name="scheduler_enabled" value="true"
                    {{ 'checked' if config.scheduler.enabled }}
                    class="rounded text-indigo-600">
                <span class="text-sm font-medium">启用定时任务</span>
            </label>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Cron 表达式</label>
                    <input type="text" name="scheduler_cron" value="{{ config.scheduler.cron }}"
                        class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm font-mono focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                        placeholder="0 8 * * *">
                    <p class="text-xs text-gray-400 mt-1">格式: 分 时 日 月 周几</p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">每次抓取天数</label>
                    <input type="number" name="fetch_days" value="{{ config.scheduler.fetch_days }}" min="1" max="30"
                        class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
            </div>
        </div>
    </section>

    <div class="flex justify-end">
        <button type="submit" class="bg-indigo-600 text-white px-6 py-2.5 rounded-lg text-sm font-medium hover:bg-indigo-700 transition shadow-sm">
            💾 保存设置
        </button>
    </div>
</form>
{% endblock %}
